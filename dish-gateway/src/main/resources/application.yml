server:
  port: 8080

spring:
  application:
    name: dish-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2s}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DISH_AGENT_GROUP}

dubbo:
  registry:
    address: nacos://${NACOS_SERVER_ADDR:localhost:8848}
  consumer:
    timeout: 30000
    check: false

llm:
  api-key: ${MINIMAX_API_KEY:your_api_key_here}
  base-url: ${MINIMAX_BASE_URL:https://api.minimax.chat/v1}
  model: ${MINIMAX_MODEL:minimax-m2.7}
  temperature: 0.7

session:
  store:
    type: ${SESSION_STORE_TYPE:memory}
    ttl-hours: ${SESSION_STORE_TTL_HOURS:12}
    default-store-id: ${SESSION_DEFAULT_STORE_ID:STORE_001}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n"
