server:
  port: 8093

spring:
  application:
    name: dish-memory
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2s}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DISH_AGENT_GROUP}

dubbo:
  protocol:
    name: dubbo
    port: 20886
  registry:
    address: nacos://${NACOS_SERVER_ADDR:localhost:8848}
  provider:
    timeout: 5000

memory:
  # bootstrap | redis
  mode: ${MEMORY_MODE:bootstrap}
  retrieval:
    vector-dim: ${MEMORY_VECTOR_DIM:128}
    candidate-fetch-size: ${MEMORY_RETRIEVAL_CANDIDATE_FETCH_SIZE:200}
    keyword-weight: ${MEMORY_RETRIEVAL_KEYWORD_WEIGHT:0.45}
    vector-weight: ${MEMORY_RETRIEVAL_VECTOR_WEIGHT:0.55}
  long-term:
    provider: ${MEMORY_LONG_TERM_PROVIDER:inmemory}
    embedding-provider: ${MEMORY_LONG_TERM_EMBEDDING_PROVIDER:hash}
    min-score: ${MEMORY_LONG_TERM_MIN_SCORE:0.12}
    bootstrap:
      enabled: ${MEMORY_LONG_TERM_BOOTSTRAP_ENABLED:true}
      pattern: ${MEMORY_LONG_TERM_BOOTSTRAP_PATTERN:classpath*:memory/knowledge/*.md}
    milvus:
      host: ${MILVUS_HOST:localhost}
      port: ${MILVUS_PORT:19530}
      collection: ${MEMORY_MILVUS_COLLECTION:dish_memory_long_term}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${MEMORY_OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}

observability:
  trace:
    header: X-Trace-Id
    rpc-attachment: traceId
